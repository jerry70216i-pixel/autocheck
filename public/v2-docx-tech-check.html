<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V2 DOCX &#25216;&#34899;&#39511;&#35657;</title>
  <style>
    body {
      margin: 32px;
      color: #1f2933;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 8px;
    }

    button {
      margin-right: 10px;
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      background: #1f5eff;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .panel {
      max-width: 920px;
      margin: 18px 0;
      padding: 18px;
      border: 1px solid #d8dee9;
      border-radius: 12px;
      background: #fff;
    }

    .status-list {
      padding-left: 20px;
    }

    .pass {
      color: #0f7b3f;
      font-weight: 700;
    }

    .fail {
      color: #b42318;
      font-weight: 700;
    }

    .pending {
      color: #6b7280;
      font-weight: 700;
    }

    pre {
      overflow: auto;
      max-height: 360px;
      padding: 12px;
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
      white-space: pre-wrap;
    }
  </style>
  <script src="./vendor/pizzip.js"></script>
  <script src="./vendor/pizzip-utils.js"></script>
  <script src="./vendor/docxtemplater.js"></script>
  <script src="./vendor/docxtemplater-image-module-free-browserify.js"></script>
</head>
<body>
  <h1>V2 DOCX &#25216;&#34899;&#39511;&#35657;</h1>
  <p>&#27492;&#38913;&#21482;&#29992;&#26044;&#39511;&#35657;&#28687;&#35261;&#22120;&#31471;&#26159;&#21542;&#33021;&#20197; Word .docx &#31684;&#26412;&#26367;&#25563; placeholder&#12289;&#25554;&#20837;&#22294;&#29255;&#20006;&#19979;&#36617;&#27491;&#24335; .docx&#12290;</p>

  <section class="panel">
    <h2>Vendor &#36617;&#20837;&#29376;&#24907;</h2>
    <ul id="vendorStatus" class="status-list"></ul>
  </section>

  <section class="panel">
    <h2>&#25805;&#20316;</h2>
    <button id="generateButton" type="button">&#29986;&#29983;&#28204;&#35430; docx</button>
    <button id="generateSupervisionButton" type="button">&#29986;&#29983;&#30435;&#36896;&#28204;&#35430; docx</button>
  </section>

  <section class="panel">
    <h2>&#33258;&#20027;&#28204;&#35430;&#32080;&#26524;</h2>
    <ul id="testStatus" class="status-list">
      <li><span class="pending">[PENDING]</span> &#23578;&#26410;&#38283;&#22987;</li>
    </ul>
  </section>

  <section class="panel">
    <h2>&#30435;&#36896;&#28204;&#35430;&#32080;&#26524;</h2>
    <ul id="supervisionTestStatus" class="status-list">
      <li><span class="pending">[PENDING]</span> &#23578;&#26410;&#38283;&#22987;</li>
    </ul>
  </section>

  <section class="panel">
    <h2>&#37679;&#35492;&#35338;&#24687;</h2>
    <pre id="errorOutput">&#28961;</pre>
  </section>

  <script>
    "use strict";

    const SELF_TEMPLATE_PATH = "../templates/self-check-template.docx";
    const SUPERVISION_TEMPLATE_PATH = "../templates/supervision-inspection-template.docx";
    const SELF_OUTPUT_FILE_NAME = "v2-docx-template-tech-check.docx";
    const SUPERVISION_OUTPUT_FILE_NAME = "v2-supervision-docx-tech-check.docx";
    const SELF_IMAGE_SIZE = [460, 280];
    const SUPERVISION_IMAGE_SIZE = [480, 300];

    const SELF_PLACEHOLDER_MAP = {
      SELF_DOC_NO: "text",
      SELF_DOC_VERSION: "text",
      PROJECT_NAME: "text",
      SELF_PHOTO_1: "image",
      SELF_DATE_1: "text",
      SELF_LOCATION_1: "text",
      SELF_DESC_1: "text",
      SELF_DESIGN_VALUE_1: "text",
      SELF_MEASURED_VALUE_1: "text",
      SELF_PHOTO_2: "image",
      SELF_DATE_2: "text",
      SELF_LOCATION_2: "text",
      SELF_DESC_2: "text",
      SELF_DESIGN_VALUE_2: "text",
      SELF_MEASURED_VALUE_2: "text",
      SELF_PHOTO_3: "image",
      SELF_DATE_3: "text",
      SELF_LOCATION_3: "text",
      SELF_DESC_3: "text",
      SELF_DESIGN_VALUE_3: "text",
      SELF_MEASURED_VALUE_3: "text"
    };

    const SUPERVISION_PLACEHOLDER_MAP = {
      SUP_DOC_NO: "text",
      SUP_DOC_VERSION: "text",
      COMPANY_NAME: "text",
      PROJECT_NAME: "text",
      CHECK_ITEM: "text",
      SUP_PHOTO_1: "image",
      SUP_DATE_1: "text",
      SUP_LOCATION_1: "text",
      SUP_DESC_1: "text",
      SUP_DESIGN_VALUE_1: "text",
      SUP_MEASURED_VALUE_1: "text",
      SUP_PHOTO_2: "image",
      SUP_DATE_2: "text",
      SUP_LOCATION_2: "text",
      SUP_DESC_2: "text",
      SUP_DESIGN_VALUE_2: "text",
      SUP_MEASURED_VALUE_2: "text"
    };

    const vendorChecks = [
      ["PizZip", () => typeof window.PizZip === "function"],
      ["PizZipUtils", () => typeof window.PizZipUtils === "object"],
      ["Docxtemplater", () => typeof window.docxtemplater === "function"],
      ["ImageModule", () => typeof window.ImageModule === "function"]
    ];

    const vendorStatus = document.getElementById("vendorStatus");
    const testStatus = document.getElementById("testStatus");
    const supervisionTestStatus = document.getElementById("supervisionTestStatus");
    const errorOutput = document.getElementById("errorOutput");
    const generateButton = document.getElementById("generateButton");
    const generateSupervisionButton = document.getElementById("generateSupervisionButton");

    renderVendorStatus();
    generateButton.addEventListener("click", generateSelfCheckDocx);
    generateSupervisionButton.addEventListener("click", generateSupervisionDocx);

    function renderVendorStatus() {
      vendorStatus.innerHTML = vendorChecks.map(([label, check]) => {
        const passed = check();
        return `<li><span class="${passed ? "pass" : "fail"}">[${passed ? "PASS" : "FAIL"}]</span> ${escapeHtml(label)}</li>`;
      }).join("");

      const disabled = vendorChecks.some(([, check]) => !check());
      generateButton.disabled = disabled;
      generateSupervisionButton.disabled = disabled;
    }

    async function generateSelfCheckDocx() {
      const results = [];
      errorOutput.textContent = "None";
      generateButton.disabled = true;

      try {
        assertVendorLoaded();
        results.push(pass("vendor loaded"));

        const templateBuffer = await loadTemplate(SELF_TEMPLATE_PATH);
        results.push(pass("self template loaded"));

        const imageDataUrl = createCanvasImageDataUrl("V2 DOCX IMAGE TEST");
        const zip = new window.PizZip(templateBuffer);
        convertDoubleBracePlaceholders(zip, SELF_PLACEHOLDER_MAP);
        const doc = createDocxtemplater(zip, SELF_IMAGE_SIZE);

        doc.render(buildSelfTemplateData(imageDataUrl));
        results.push(pass("self text placeholders rendered"));
        results.push(pass("self image inserted"));

        const blob = generateDocxBlob(doc);
        results.push(pass(`self docx generated: ${blob.size} bytes`));

        downloadBlob(blob, SELF_OUTPUT_FILE_NAME);
        results.push(pass(`download triggered: ${SELF_OUTPUT_FILE_NAME}`));
        renderTestStatus(results);
      } catch (error) {
        results.push(fail("self test failed"));
        renderTestStatus(results);
        errorOutput.textContent = error && error.stack ? error.stack : String(error);
      } finally {
        renderVendorStatus();
      }
    }

    async function generateSupervisionDocx() {
      const results = [];
      errorOutput.textContent = "None";
      generateSupervisionButton.disabled = true;

      try {
        assertVendorLoaded();
        results.push(pass("vendor loaded"));

        const templateBuffer = await loadTemplate(SUPERVISION_TEMPLATE_PATH);
        results.push(pass("supervision template loaded"));

        const photo1DataUrl = createCanvasImageDataUrl("SUP PHOTO 1 TEST");
        const photo2DataUrl = createCanvasImageDataUrl("SUP PHOTO 2 TEST");
        const zip = new window.PizZip(templateBuffer);
        convertDoubleBracePlaceholders(zip, SUPERVISION_PLACEHOLDER_MAP);
        const doc = createDocxtemplater(zip, SUPERVISION_IMAGE_SIZE);

        doc.render(buildSupervisionTemplateData(photo1DataUrl, photo2DataUrl));
        results.push(pass("supervision text placeholders rendered"));
        results.push(pass("supervision image 1 inserted"));
        results.push(pass("supervision image 2 inserted"));

        const blob = generateDocxBlob(doc);
        results.push(pass(`supervision docx generated: ${blob.size} bytes`));

        downloadBlob(blob, SUPERVISION_OUTPUT_FILE_NAME);
        results.push(pass(`download triggered: ${SUPERVISION_OUTPUT_FILE_NAME}`));
        renderSupervisionTestStatus(results);
      } catch (error) {
        results.push(fail("supervision test failed"));
        renderSupervisionTestStatus(results);
        errorOutput.textContent = error && error.stack ? error.stack : String(error);
      } finally {
        renderVendorStatus();
      }
    }

    async function loadTemplate(templatePath) {
      const response = await fetch(templatePath);

      if (!response.ok) {
        throw new Error(`Template load failed: HTTP ${response.status} ${response.statusText}`);
      }

      return response.arrayBuffer();
    }

    function createDocxtemplater(zip, imageSize) {
      const imageModule = new window.ImageModule({
        centered: false,
        fileType: "docx",
        getImage(tagValue) {
          return dataUrlToArrayBuffer(tagValue);
        },
        getSize() {
          return imageSize;
        }
      });

      return new window.docxtemplater(zip, {
        modules: [imageModule],
        paragraphLoop: true,
        linebreaks: true
      });
    }

    function convertDoubleBracePlaceholders(zip, placeholderMap) {
      Object.keys(zip.files).forEach((name) => {
        if (!name.startsWith("word/") || !name.endsWith(".xml")) {
          return;
        }

        const file = zip.file(name);

        if (!file) {
          return;
        }

        let xml = file.asText();

        Object.keys(placeholderMap).forEach((key) => {
          const replacement = placeholderMap[key] === "image" ? `{%${key}}` : `{${key}}`;
          xml = xml.split(`{{${key}}}`).join(replacement);
        });

        zip.file(name, xml);
      });
    }

    function buildSelfTemplateData(imageDataUrl) {
      return {
        SELF_DOC_NO: "09132-07-QL-01-01",
        SELF_DOC_VERSION: "114.05.28  V03",
        PROJECT_NAME: "\u0056\u0032 \u6280\u8853\u9a57\u8b49\u5de5\u7a0b",
        SELF_PHOTO_1: imageDataUrl,
        SELF_DATE_1: "114.05.28",
        SELF_LOCATION_1: "\u6e2c\u8a66\u4f4d\u7f6e",
        SELF_DESC_1: "\u6e2c\u8a66\u8aaa\u660e",
        SELF_DESIGN_VALUE_1: "\u8a2d\u8a08\u503c 100",
        SELF_MEASURED_VALUE_1: "\u5be6\u6e2c\u503c 98",
        SELF_PHOTO_2: "",
        SELF_DATE_2: "",
        SELF_LOCATION_2: "",
        SELF_DESC_2: "",
        SELF_DESIGN_VALUE_2: "",
        SELF_MEASURED_VALUE_2: "",
        SELF_PHOTO_3: "",
        SELF_DATE_3: "",
        SELF_LOCATION_3: "",
        SELF_DESC_3: "",
        SELF_DESIGN_VALUE_3: "",
        SELF_MEASURED_VALUE_3: ""
      };
    }

    function buildSupervisionTemplateData(photo1DataUrl, photo2DataUrl) {
      return {
        SUP_DOC_NO: "09132-07-QL-03-01",
        SUP_DOC_VERSION: "114.03.20  V03",
        COMPANY_NAME: "\u53f0\u7063\u4e16\u66e6\u5de5\u7a0b\u9867\u554f\u80a1\u4efd\u6709\u9650\u516c\u53f8",
        PROJECT_NAME: "\u0056\u0032 \u76e3\u9020\u6280\u8853\u9a57\u8b49\u5de5\u7a0b",
        CHECK_ITEM: "\u76e3\u9020\u67e5\u9a57\u6e2c\u8a66\u9805\u76ee",
        SUP_PHOTO_1: photo1DataUrl,
        SUP_DATE_1: "114.05.28",
        SUP_LOCATION_1: "\u76e3\u9020\u6e2c\u8a66\u4f4d\u7f6e 1",
        SUP_DESC_1: "\u76e3\u9020\u6e2c\u8a66\u8aaa\u660e 1",
        SUP_DESIGN_VALUE_1: "\u8a2d\u8a08\u503c 100",
        SUP_MEASURED_VALUE_1: "\u5be6\u6e2c\u503c 98",
        SUP_PHOTO_2: photo2DataUrl,
        SUP_DATE_2: "114.05.28",
        SUP_LOCATION_2: "\u76e3\u9020\u6e2c\u8a66\u4f4d\u7f6e 2",
        SUP_DESC_2: "\u76e3\u9020\u6e2c\u8a66\u8aaa\u660e 2",
        SUP_DESIGN_VALUE_2: "\u8a2d\u8a08\u503c 200",
        SUP_MEASURED_VALUE_2: "\u5be6\u6e2c\u503c 198"
      };
    }

    function createCanvasImageDataUrl(label) {
      const canvas = document.createElement("canvas");
      canvas.width = 900;
      canvas.height = 540;

      const context = canvas.getContext("2d");
      context.fillStyle = "#f8fafc";
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.strokeStyle = "#1f5eff";
      context.lineWidth = 18;
      context.strokeRect(24, 24, canvas.width - 48, canvas.height - 48);
      context.fillStyle = "#102a43";
      context.font = "700 56px Microsoft JhengHei, sans-serif";
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillText(label, canvas.width / 2, canvas.height / 2);

      return canvas.toDataURL("image/png");
    }

    function dataUrlToArrayBuffer(dataUrl) {
      const base64 = dataUrl.split(",")[1] || "";
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }

      return bytes.buffer;
    }

    function generateDocxBlob(doc) {
      return doc.getZip().generate({
        type: "blob",
        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        compression: "DEFLATE"
      });
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function assertVendorLoaded() {
      const missing = vendorChecks
        .filter(([, check]) => !check())
        .map(([label]) => label);

      if (missing.length > 0) {
        throw new Error(`Vendor load failed: ${missing.join(", ")}`);
      }
    }

    function renderTestStatus(rows) {
      testStatus.innerHTML = rows.join("");
    }

    function renderSupervisionTestStatus(rows) {
      supervisionTestStatus.innerHTML = rows.join("");
    }

    function pass(message) {
      return `<li><span class="pass">[PASS]</span> ${escapeHtml(message)}</li>`;
    }

    function fail(message) {
      return `<li><span class="fail">[FAIL]</span> ${escapeHtml(message)}</li>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
